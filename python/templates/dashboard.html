<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>判例助手 · 后台面板</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #f3f4f6; color: #1f2937; }
  h1 { color: #1e3a5f; font-family: "Noto Serif SC", "Songti SC", serif; }
  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat { background: #eef2f7; border-radius: 8px; padding: 16px; text-align: center; }
  .stat .num { font-size: 32px; font-weight: 800; color: #1e3a5f; }
  .stat .label { font-size: 12px; color: #6b7280; margin-top: 4px; }
  .feedback-item { padding: 10px 0; border-bottom: 1px solid #e5e7eb; font-size: 13px; }
  .feedback-item:last-child { border: none; }
  .feedback-item .meta { color: #6b7280; font-size: 11px; }
  button { padding: 8px 16px; background: #1e3a5f; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
<h1>判例助手 · 后台面板</h1>
<p style="color:#6b7280;">实时数据 <span id="time"></span></p>
<div class="card">
  <div class="stats" id="stats"></div>
</div>
<div class="card">
  <h3>最近反馈</h3>
  <div id="feedback"></div>
</div>
<button onclick="刷新()">刷新</button>

<script>
async function 刷新() {
  const resp = await fetch("/dashboard/data");
  const d = await resp.json();
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="num">${d.分析总数||0}</div><div class="label">分析总数</div></div>
    <div class="stat"><div class="num">${d.判决书分析||0}</div><div class="label">判决书</div></div>
    <div class="stat"><div class="num">${d.案情分析||0}</div><div class="label">案情分析</div></div>
    <div class="stat"><div class="num">${d.用户数||0}</div><div class="label">用户数</div></div>
  `;
  const fbResp = await fetch("/feedback-data");
  const fb = await fbResp.json();
  const fbDiv = document.getElementById("feedback");
  if (!fb.反馈 || fb.反馈.length === 0) {
    fbDiv.innerHTML = '<div style="color:#9ca3af;font-size:13px;">暂无反馈</div>';
  } else {
    fbDiv.innerHTML = fb.反馈.map(f => `
      <div class="feedback-item">
        <strong>${f.判例名}</strong> · 有帮助: ${f.有帮助程度==='very'?'非常有':f.有帮助程度==='somewhat'?'有一点':'无'}
        <div class="meta">最有价值: ${(f.最有价值模块||[]).join('、')} · ${f.提交时间||f.分析日期||''}</div>
      </div>
    `).join("");
  }
  document.getElementById("time").textContent = new Date().toLocaleTimeString();
}
刷新();
</script>
</body>
</html>
