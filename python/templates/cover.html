<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, 'Noto Sans SC', sans-serif;
    background: #0a0a0a;
    width: 800px; height: 400px;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 720px; height: 320px;
    background: #111;
    border: 1px solid #2a2a2a;
    padding: 48px;
    position: relative;
    display: flex; flex-direction: column; justify-content: center;
  }
  .card::before {
    content: ''; position: absolute; top:0; left:0;
    width: 4px; height: 100%; background: #c0392b;
  }
  h1 { font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 12px; }
  .tagline {
    font-size: 13px; color: #c0392b; letter-spacing: 6px;
    margin-bottom: 20px;
  }
  .body-text {
    font-size: 16px; color: #888; font-weight: 300; line-height: 1.6;
  }
  .body-text strong { color: #ddd; font-weight: 700; }
  .bottom {
    margin-top: 24px;
    font-size: 12px; color: #444; letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="tagline">工程事故记录员</div>
  <h1>判例助手</h1>
  <div class="body-text">
    做了 20 天。<strong>被另一个 AI 用 5 分钟拆穿。</strong><br>
    7 项硬校验，1 个是真的。<br>
    不藏。诚实是第一修复。
  </div>
  <div class="bottom">AI 产品开发 ｜ 先审计，再发布</div>
</div>
</body>
</html>
