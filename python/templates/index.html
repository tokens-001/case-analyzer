<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>判例助手</title>
<style>
  /* ---- 基础重置 ---- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2129;
    --border: #30363d;
    --border-focus: #5b8def;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --text-bright: #e6edf3;
    --blue: #58a6ff;
    --red: #f85149;
    --green: #3fb950;
    --amber: #d2991d;
    --purple: #a371f7;
    --orange: #f0883e;
    --teal: #39d2c0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ---- 头部 ---- */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(12px);
  }
  .header-brand { display: flex; align-items: center; gap: 14px; }
  .header-logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #fff;
    box-shadow: 0 2px 12px rgba(37,99,235,.25);
  }
  .header-text h1 { font-size: 19px; font-weight: 700; color: var(--text-bright); letter-spacing: -0.3px; }
  .header-text .tagline { font-size: 12px; color: var(--text-dim); margin-top: 1px; }

  .mode-switch { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .mode-btn {
    padding: 7px 16px; font-size: 12px; font-weight: 600;
    background: var(--surface2); color: var(--text-dim);
    border: none; cursor: pointer; transition: all .2s;
  }
  .mode-btn.active { background: var(--blue); color: #fff; }
  .mode-btn:hover:not(.active) { color: var(--text); background: var(--surface); }

  .input-hint { font-size: 11px; color: var(--text-dim); }

  /* ---- 主布局 ---- */
  .main { max-width: 1120px; margin: 0 auto; padding: 32px 24px; }

  /* ---- 输入区 ---- */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 28px;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  .input-section .section-label {
    font-size: 13px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 16px;
  }
  .input-row { display: flex; gap: 12px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  .input-row label { font-size: 13px; color: var(--text-dim); white-space: nowrap; min-width: 66px; font-weight: 500; }
  .input-row input[type="text"] {
    flex: 1; min-width: 160px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 15px;
    color: var(--text-bright);
    font-size: 14px;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-row input[type="text"]:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(88,166,255,.12); }
  .input-row input[type="date"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text-bright);
    font-size: 13px;
    font-family: inherit;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-row input[type="date"]:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(88,166,255,.12); }

  textarea {
    width: 100%; height: 260px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    color: var(--text-bright);
    font-size: 14px;
    font-family: "SF Mono", "Cascadia Code", "Menlo", monospace;
    line-height: 1.8;
    resize: vertical;
    margin-bottom: 16px;
    transition: border-color .2s, box-shadow .2s;
  }
  textarea:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(88,166,255,.12); }
  textarea::placeholder { color: #484f58; }

  .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn {
    padding: 11px 26px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all .2s;
    letter-spacing: 0.2px;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.3); }
  .btn:active { transform: translateY(0); }
  .btn-primary { background: linear-gradient(135deg, #2563eb, #4f46e5); color: #fff; }
  .btn-primary:hover { box-shadow: 0 4px 20px rgba(37,99,235,.35); }
  .btn-secondary {
    background: var(--surface2); color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: #484f58; color: var(--text); }
  .btn-ghost {
    background: transparent; color: var(--text-dim);
    border: 1px solid var(--border); padding: 11px 18px; font-size: 13px;
  }
  .btn-ghost:hover { border-color: #484f58; color: var(--text); }

  .file-upload { position: relative; }
  .file-upload input[type="file"] { position: absolute; opacity: 0; width: 0; height: 0; }

  /* ---- 加载状态 ---- */
  .loading {
    display: none; text-align: center; padding: 48px 32px;
    color: var(--text-dim); font-size: 14px;
  }
  .loading.active { display: block; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* ---- 错误提示 ---- */
  .error {
    display: none;
    background: rgba(248,81,73,.1);
    border: 1px solid rgba(248,81,73,.3);
    color: var(--red);
    padding: 14px 18px; border-radius: 8px;
    margin-bottom: 20px; font-size: 14px;
  }
  .error.active { display: block; animation: fadeInUp .3s ease; }

  /* ---- 结果区 ---- */
  .results { display: none; }
  .results.active { display: block; }
  .results.active > * { animation: fadeInUp .4s ease backwards; }
  .results.active > *:nth-child(2) { animation-delay: .05s; }
  .results.active > *:nth-child(3) { animation-delay: .1s; }
  .results.active > *:nth-child(4) { animation-delay: .15s; }
  .results.active > *:nth-child(5) { animation-delay: .2s; }

  /* ---- 六维卡片 2×3 ---- */
  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    transition: border-color .2s, box-shadow .2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .card:nth-child(1)::before { background: var(--blue); }
  .card:nth-child(2)::before { background: var(--purple); }
  .card:nth-child(3)::before { background: var(--amber); }
  .card:nth-child(4)::before { background: var(--teal); }
  .card:nth-child(5)::before { background: var(--red); }
  .card:nth-child(6)::before { background: var(--orange); }
  .card:nth-child(7)::before { background: #db2777; }
  .card:nth-child(8)::before { background: #0891b2; }
  .card:hover { border-color: #484f58; box-shadow: 0 4px 20px rgba(0,0,0,.25); }
  .card h3 {
    font-size: 13px; font-weight: 700; margin-bottom: 12px;
    letter-spacing: 0.3px; display: flex; align-items: center; gap: 8px;
  }
  .card:nth-child(1) h3 { color: var(--blue); }
  .card:nth-child(2) h3 { color: var(--purple); }
  .card:nth-child(3) h3 { color: var(--amber); }
  .card:nth-child(4) h3 { color: var(--teal); }
  .card:nth-child(5) { border-color: rgba(248,81,73,.25); }
  .card:nth-child(5) h3 { color: var(--red); }
  .card:nth-child(6) { border-color: rgba(240,136,62,.25); }
  .card:nth-child(6) h3 { color: var(--orange); }
  .card:nth-child(7) { border-color: rgba(219,39,119,.25); }
  .card:nth-child(7) h3 { color: #ec4899; }
  .card:nth-child(8) { border-color: rgba(8,145,178,.25); }
  .card:nth-child(8) h3 { color: #06b6d4; }
  .card .content {
    font-size: 13px; color: var(--text-dim);
    white-space: pre-wrap; line-height: 1.85;
  }

  /* 结构化摘要 */
  .card-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    margin-bottom: 16px;
    border-left: 3px solid var(--purple);
  }
  .card-summary h3 {
    font-size: 13px; font-weight: 700; color: var(--text-bright);
    margin-bottom: 12px; letter-spacing: 0.3px;
  }
  .card-summary .content { font-size: 14px; color: var(--text-dim); line-height: 1.9; }

  /* 溯源 */
  .trace-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 22px; margin-bottom: 16px;
  }
  .trace-section h3 { font-size: 13px; font-weight: 700; color: var(--text-bright); margin-bottom: 14px; }
  .trace-item {
    background: var(--surface2);
    border-left: 3px solid var(--blue);
    padding: 12px 16px; margin-bottom: 8px;
    border-radius: 0 8px 8px 0;
    font-size: 13px; color: var(--text-dim);
  }
  .trace-item .label { font-size: 11px; color: var(--blue); font-weight: 700; margin-bottom: 4px; }
  .trace-item.invalid { border-left-color: var(--red); }
  .trace-item.invalid .label { color: var(--red); }

  /* 法条对照 */
  .law-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 22px; margin-bottom: 16px;
  }
  .law-section h3 { font-size: 13px; font-weight: 700; color: var(--text-bright); margin-bottom: 14px; }
  .law-item {
    background: var(--surface2);
    padding: 12px 16px; margin-bottom: 8px;
    border-radius: 8px; font-size: 13px; color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .law-item .law-name { font-size: 12px; color: var(--blue); font-weight: 700; margin-bottom: 6px; }

  /* 验证 */
  .validation {
    padding: 12px 18px; border-radius: 8px;
    font-size: 13px; margin-bottom: 16px; font-weight: 500;
  }
  .validation.pass { background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.25); color: var(--green); }
  .validation.warn { background: rgba(210,153,29,.1); border: 1px solid rgba(210,153,29,.25); color: var(--amber); }
  .validation .warn-item { margin-top: 4px; }
  .validation .warn-item::before { content: "⚠️ "; }

  /* 风险提示 */
  .risk-section { margin-bottom: 16px; }
  .risk-item {
    padding: 14px 18px; border-radius: 10px; margin-bottom: 8px;
    font-size: 14px; font-weight: 500;
    display: flex; align-items: flex-start; gap: 10px;
    animation: fadeInUp .35s ease backwards;
  }
  .risk-item.warning { background: rgba(210,153,29,.08); border: 1px solid rgba(210,153,29,.3); color: var(--amber); }
  .risk-item.danger { background: rgba(248,81,73,.08); border: 1px solid rgba(248,81,73,.3); color: var(--red); }


  /* 历史 */
  .history-toggle {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; font-size: 13px; color: var(--text-dim);
    margin-bottom: 16px; user-select: none; padding: 10px 0;
    transition: color .2s;
  }
  .history-toggle:hover { color: var(--text); }
  .history-list { display: none; }
  .history-list.active { display: block; }
  .history-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 20px; margin-bottom: 8px;
    cursor: pointer; transition: all .2s;
  }
  .history-item:hover { border-color: var(--blue); box-shadow: 0 2px 12px rgba(88,166,255,.06); }
  .history-item .h-name { font-size: 14px; color: var(--text-bright); font-weight: 600; }
  .history-item .h-meta { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  /* 可信度仪表盘 */
  .trust-dashboard {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 26px; margin-bottom: 20px;
    display: flex; gap: 28px; align-items: center; flex-wrap: wrap;
  }
  .trust-score-ring {
    width: 80px; height: 80px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800;
    flex-shrink: 0;
  }
  .trust-score-ring.high { background: rgba(63,185,80,.12); border: 3px solid var(--green); color: var(--green); }
  .trust-score-ring.mid { background: rgba(210,153,29,.12); border: 3px solid var(--amber); color: var(--amber); }
  .trust-score-ring.low { background: rgba(248,81,73,.12); border: 3px solid var(--red); color: var(--red); }
  .trust-detail { flex: 1; min-width: 200px; }
  .trust-detail .trust-label { font-size: 12px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.5px; }
  .trust-detail .trust-sub { font-size: 13px; color: var(--text); margin-top: 4px; }
  .trust-breakdown { font-size: 12px; color: var(--text-dim); margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
  .trust-breakdown .tbitem { display: flex; align-items: center; gap: 4px; }
  .trust-breakdown .tbitem.up { color: var(--green); }
  .trust-breakdown .tbitem.down { color: var(--red); }

  /* 折叠区 */
  .collapse-toggle {
    cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 6px;
  }
  .collapse-toggle:hover { opacity: 0.8; }
  .collapse-toggle .arrow { transition: transform .2s; font-size: 11px; }
  .collapse-toggle.open .arrow { transform: rotate(90deg); }
  .collapse-body { display: none; margin-top: 14px; }
  .collapse-body.open { display: block; }

  /* 响应式 */
  @media (max-width: 700px) {
    .card-grid { grid-template-columns: 1fr; }
    .header { padding: 14px 18px; }
    .main { padding: 16px 12px; }
    .input-section { padding: 18px; }
    .trust-dashboard { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<!-- 头部 -->
<div class="header">
  <div class="header-brand">
    <div class="header-logo">⚖️</div>
    <div class="header-text">
      <h1>判例助手 <span style="font-size:11px;color:var(--amber);font-weight:400;">测试版</span></h1>
      <div class="tagline" id="tagline">AI驱动的判例分析 · 溯源校验 + 法条版本核对</div>
    </div>
  </div>
  <div class="mode-switch">
    <button class="mode-btn active" id="mode-judgment" onclick="切换模式('judgment')">判决书</button>
    <button class="mode-btn" id="mode-case" onclick="切换模式('case')">案情分析</button>
  </div>
</div>

<div class="main">

  <!-- 输入区 -->
  <div class="input-section">
    <div class="input-row">
      <label id="caseNameLabel">判例名称</label>
      <input type="text" id="caseName" placeholder="例：张某诉李某合同纠纷案">
      <span class="input-hint">💡 可留空，AI 自动从内容提取名称</span>
    </div>

    <textarea id="caseText" placeholder="在此粘贴判例全文……"></textarea>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="开始分析()">开始分析</button>
      <span class="file-upload">
        <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">📂 从文件读取</button>
        <input type="file" id="fileInput" accept=".txt" onchange="读文件(this)">
      </span>
      <button class="btn btn-ghost" onclick="清空()">清空</button>
      <span id="remaining" style="margin-left:auto; font-size:13px; color:#6b7280;"></span>
    </div>
  </div>

  <!-- 加载中 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    AI正在分析判例……六维并行处理中，约需30-50秒
  </div>

  <!-- 错误 -->
  <div class="error" id="error"></div>

  <!-- 结果区 -->
  <div class="results" id="results">

    <!-- ⚠️ 风险提示（最优先展示） -->
    <div class="risk-section" id="risk-section" style="display:none;">
      <div id="risk-items"></div>
    </div>

    <!-- 可信度仪表盘 -->
    <div class="trust-dashboard" id="trust-dashboard" style="display:none;">
      <div class="trust-score-ring" id="trust-ring">--</div>
      <div class="trust-detail">
        <div class="trust-label">分析可信度</div>
        <div class="trust-sub" id="trust-sub"></div>
        <div class="trust-breakdown" id="trust-breakdown"></div>
      </div>
    </div>

    <!-- 结构化摘要：事实→争议→理由→结果 -->
    <div class="card-summary" id="struct-summary-section" style="display:none;">
      <h3>📐 判决结构化</h3>
      <div class="content" id="r-struct-summary" style="white-space:pre-wrap;"></div>
    </div>

    <!-- 分析卡片区（动态渲染） -->
    <div class="card-grid" id="cardGrid"></div>

    <!-- 综合总结 -->
    <div class="card-summary" id="summary-card" style="display:none; border-left-color:var(--green);">
      <h3>📋 综合总结</h3>
      <div class="content" id="r-summary"></div>
    </div>

    <!-- 法条统计 -->
    <div class="validation pass" id="r-lawstats" style="font-size:13px; color:#8ccb8c;"></div>

    <!-- 溯源对比 -->
    <div class="trace-section" id="trace-section" style="display:none;">
      <h3 class="collapse-toggle" onclick="this.classList.toggle('open');document.getElementById('trace-body').classList.toggle('open')"><span class="arrow">▶</span> 🔍 溯源对比</h3>
      <div class="collapse-body" id="trace-body"><div id="trace-items"></div></div>
    </div>

    <!-- 法条库对照 -->
    <div class="law-section" id="law-section" style="display:none;">
      <h3 class="collapse-toggle" onclick="this.classList.toggle('open');document.getElementById('law-body').classList.toggle('open')"><span class="arrow">▶</span> 📖 法条库对照</h3>
      <div class="collapse-body" id="law-body"><div id="law-items"></div></div>
    </div>

    <!-- 验证 -->
    <div class="validation pass" id="validation"></div>

    <!-- 下载按钮 -->
    <div style="text-align:center; margin-top:8px;">
      <button class="btn btn-primary" onclick="下载报告()" id="btnDownload" style="display:none;">📥 下载分析报告</button>
    </div>

    <!-- 反馈区 -->
    <div id="feedback-section" style="display:none; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:22px; margin-top:20px;">
      <div id="feedback-form">
      <div style="font-size:14px; font-weight:600; color:var(--text-bright); margin-bottom:18px;">📊 帮助我们改进（全选择题，30秒搞定）</div>

      <!-- 第一步：有帮助程度 -->
      <div style="margin-bottom:16px;">
        <div style="font-size:13px; color:var(--text-dim); margin-bottom:8px;">1. 这个分析结果对你有帮助吗？<span style="color:var(--red);">*</span></div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;" id="q-helpfulness">
          <label class="fb-radio"><input type="radio" name="helpfulness" value="very"> 非常有帮助</label>
          <label class="fb-radio"><input type="radio" name="helpfulness" value="somewhat"> 有一点帮助</label>
          <label class="fb-radio"><input type="radio" name="helpfulness" value="little"> 没什么帮助</label>
          <label class="fb-radio"><input type="radio" name="helpfulness" value="none"> 完全没帮助</label>
        </div>
      </div>

      <!-- 第二步：最有价值模块 -->
      <div style="margin-bottom:16px;">
        <div style="font-size:13px; color:var(--text-dim); margin-bottom:8px;">2. 哪个模块最有价值？（可多选）<span style="color:var(--red);">*</span></div>
        <div style="display:flex; gap:6px; flex-wrap:wrap;" id="q-valuable"></div>
      </div>

      <!-- 第三步：最没用模块 -->
      <div style="margin-bottom:16px;">
        <div style="font-size:13px; color:var(--text-dim); margin-bottom:8px;">3. 哪个模块最没用？（可多选）<span style="color:var(--red);">*</span></div>
        <div style="display:flex; gap:6px; flex-wrap:wrap;" id="q-useless"></div>
      </div>

      <!-- 第四步：如果只能保留3个模块 -->
      <div style="margin-bottom:16px;">
        <div style="font-size:13px; color:var(--text-dim); margin-bottom:8px;">4. 如果只能保留3个模块，你会留下哪些？（选1-3个）<span style="color:var(--red);">*</span></div>
        <div style="display:flex; gap:6px; flex-wrap:wrap;" id="q-keep"></div>
      </div>

      <!-- 第五步：问题类型 -->
      <div style="margin-bottom:16px;">
        <div style="font-size:13px; color:var(--text-dim); margin-bottom:8px;">5. 遇到了什么问题？（可选）</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;" id="q-issues">
          <label class="fb-radio"><input type="radio" name="issue_type" value="ai_error"> AI分析错误</label>
          <label class="fb-radio"><input type="radio" name="issue_type" value="law_error"> 法条引用错误</label>
          <label class="fb-radio"><input type="radio" name="issue_type" value="bug"> 页面Bug</label>
          <label class="fb-radio"><input type="radio" name="issue_type" value="slow"> 响应太慢</label>
          <label class="fb-radio"><input type="radio" name="issue_type" value="unclear"> 看不懂结果</label>
          <label class="fb-radio"><input type="radio" name="issue_type" value="other"> 其它</label>
        </div>
      </div>

      <!-- 第六步：补充意见 -->
      <div style="margin-bottom:16px;">
        <div style="font-size:13px; color:var(--text-dim); margin-bottom:8px;">6. 补充意见（选填）</div>
        <textarea id="feedbackComment" placeholder="任何想说的……" style="width:100%; height:64px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text-bright); font-size:13px; font-family:inherit; resize:vertical;"></textarea>
      </div>

      <button class="btn btn-primary" onclick="提交反馈()" style="font-size:13px; padding:10px 28px;">提交反馈</button>
      <span id="feedback-err" style="display:none; color:var(--red); font-size:13px; margin-left:12px;"></span>
      </div><!-- #feedback-form -->
      <div id="feedback-done" style="display:none; color:var(--green); font-size:14px; text-align:center; padding:12px;">✅ 感谢反馈！你的选择会直接影响产品方向。</div>
      <span id="feedback-err" style="display:none; color:var(--red); font-size:13px; margin-left:12px;"></span>
    </div>

    <style>
      .fb-radio {
        display:inline-flex; align-items:center; gap:4px;
        padding:6px 14px; border:1px solid var(--border); border-radius:20px;
        font-size:12px; color:var(--text-dim); cursor:pointer;
        transition: all .2s; background:var(--bg);
      }
      .fb-radio:hover { border-color:#484f58; color:var(--text); }
      .fb-radio:has(input:checked) { border-color:var(--blue); color:var(--blue); background:rgba(88,166,255,.08); }
      .fb-radio input { display:none; }
      .fb-chip {
        display:inline-flex; align-items:center; gap:4px;
        padding:5px 12px; border:1px solid var(--border); border-radius:6px;
        font-size:12px; color:var(--text-dim); cursor:pointer;
        transition: all .2s; background:var(--bg);
      }
      .fb-chip:hover { border-color:#484f58; color:var(--text); }
      .fb-chip:has(input:checked) { border-color:var(--green); color:var(--green); background:rgba(63,185,80,.08); }
      .fb-chip input { display:none; }
    </style>

  </div>

  <!-- 历史记录 -->
  <div class="history-toggle" onclick="切换历史()">
    <span id="historyArrow">▶</span> 历史分析记录
  </div>
  <div class="history-list" id="historyList">
    <div style="margin-bottom:12px;">
      <input type="text" id="searchInput" placeholder="搜索判例名、争议、总结…" 
        style="width:100%;background:#1a1d23;border:1px solid #323842;border-radius:6px;padding:10px 14px;color:#e5e7eb;font-size:14px;"
        oninput="过滤历史()">
    </div>
    <div id="historyItems"></div>
  </div>

</div>

<script>
// ============================================================
// 前端交互逻辑
// ============================================================

// ---- 模式切换 ----
var 当前模式 = 'judgment';

function 切换模式(mode) {
  当前模式 = mode;
  document.getElementById('mode-judgment').classList.toggle('active', mode === 'judgment');
  document.getElementById('mode-case').classList.toggle('active', mode === 'case');
  const taglines = {
    judgment: 'AI驱动的判例分析 · 溯源校验 + 法条版本核对',
    case: '案情法律分析 · 争议焦点 + 法条依据 + 风险评估'
  };
  document.getElementById('tagline').textContent = taglines[mode];
  if (mode === 'case') {
    document.getElementById('caseNameLabel').textContent = '纠纷名称';
    document.getElementById('caseName').placeholder = '例：合伙纠纷、劳动争议（留空自动生成）';
  } else {
    document.getElementById('caseNameLabel').textContent = '判例名称';
    document.getElementById('caseName').placeholder = '例：张某诉李某合同纠纷案（留空自动生成）';
  }
}

// ---- 页面加载：查剩余次数 ----
async function 刷新剩余次数() {
  try {
    const resp = await fetch("/remaining");
    const data = await resp.json();
    document.getElementById("remaining").textContent =
      `今日剩余 ${data.剩余}/${data.上限} 次`;
    if (data.剩余 === 0) {
      document.getElementById("remaining").style.color = "#e05d5d";
    }
  } catch(e) {
    document.getElementById("remaining").textContent = "";
  }
}
刷新剩余次数();

// ---- 文件读取 ----
function 读文件(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById("caseText").value = e.target.result;
    // 用文件名当判例名（去扩展名）
    if (!document.getElementById("caseName").value) {
      document.getElementById("caseName").value = file.name.replace(/\.\w+$/, "");
    }
  };
  reader.readAsText(file);
}

// ---- 清空 ----
function 清空() {
  document.getElementById("caseName").value = "";
  document.getElementById("caseText").value = "";
  document.getElementById("results").classList.remove("active");
  document.getElementById("error").classList.remove("active");
}

// ---- 开始分析 ----
async function 开始分析() {
  const name = document.getElementById("caseName").value.trim();
  const text = document.getElementById("caseText").value.trim();

  if (!text) {
    显示错误("请先输入或上传判例文字");
    return;
  }

  // 显示加载
  document.getElementById("loading").classList.add("active");
  document.getElementById("results").classList.remove("active");
  document.getElementById("error").classList.remove("active");
  document.querySelector(".loading").innerHTML = '<div class="spinner"></div>AI正在七维分析判例……含论证链检测与反例检索，约需35-55秒';

  try {
    const response = await fetch("/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name || '', text: text, mode: 当前模式 })
    });

    const data = await response.json();

    if (!response.ok) {
      显示错误(data.error || "分析失败");
      return;
    }

    渲染结果(data);
  } catch (err) {
    显示错误("网络请求失败: " + err.message);
  }
}

// ---- 显示错误 ----
function 显示错误(msg) {
  document.getElementById("loading").classList.remove("active");
  const el = document.getElementById("error");
  el.textContent = msg;
  el.classList.add("active");
  刷新剩余次数();
}

// ---- 渲染结果 ----
function 渲染结果(data) {
  document.getElementById("loading").classList.remove("active");

  // 更新剩余次数
  if (data.剩余次数 !== undefined) {
    document.getElementById("remaining").textContent =
      `今日剩余 ${data.剩余次数}/${data.今日上限} 次`;
    if (data.剩余次数 === 0) {
      document.getElementById("remaining").style.color = "#e05d5d";
    }
  }

  const a = data.分析;

  // ⚠️ 风险提示（最优先）
  const riskSection = document.getElementById("risk-section");
  const riskItems = document.getElementById("risk-items");
  if (data.风险列表 && data.风险列表.length > 0) {
    riskSection.style.display = "block";
    riskItems.innerHTML = data.风险列表.map(r => {
      const icon = r.等级 === "danger" ? "🔴" : "🟡";
      return `<div class="risk-item ${r.等级}">${icon} ${r.内容}</div>`;
    }).join("");
  } else {
    riskSection.style.display = "none";
  }

  // 结构化摘要
  const structSection = document.getElementById("struct-summary-section");
  if (a.结构化摘要) {
    structSection.style.display = "block";
    document.getElementById("r-struct-summary").textContent = a.结构化摘要;
  } else {
    structSection.style.display = "none";
  }

  // 可信度仪表盘（仅显示等级+明细，不显示伪精确数字分）
  if (data.可信度) {
    const t = data.可信度;
    document.getElementById("trust-dashboard").style.display = "flex";
    const ring = document.getElementById("trust-ring");
    const levelText = t.等级 === "高" ? "可信" : t.等级 === "中" ? "需审阅" : "不可信";
    ring.textContent = levelText;
    ring.className = "trust-score-ring " + (t.等级 === "高" ? "high" : t.等级 === "中" ? "mid" : "low");
    ring.style.fontSize = "16px";
    document.getElementById("trust-sub").textContent = "";
    const breakdownItems = (t.明细 || []).map(d =>
      `<span class="tbitem ${d.方向 === '正面' ? 'up' : d.方向 === '负面' ? 'down' : ''}">${d.方向 === '正面' ? '▲' : d.方向 === '负面' ? '▼' : '—'} ${d.来源}</span>`
    ).join("");
    document.getElementById("trust-breakdown").innerHTML = breakdownItems
      ? `<span style="font-size:11px;color:var(--text-dim);margin-right:6px;">评分明细：</span>${breakdownItems}`
      : "";
  } else {
    document.getElementById("trust-dashboard").style.display = "none";
  }

  // 动态卡片：根据返回字段渲染
  const cardTemplates = {
    "核心争议":  "🎯", "推理链路":  "🧠", "未回答问题": "❓",
    "可平移性":  "🔀", "反例检索":  "⚔️", "论证链检测": "🔗",
    "证据缺失检测": "🔎", "相反法条发现": "⚖️", "结构化摘要": "📐",
    "法律关系":  "⚖️", "风险评估":  "⚠️", "证据评估":  "📋",
    "行动建议":  "💡",
  };
  const grid = document.getElementById("cardGrid");
  let cardsHTML = "";
  for (const [key, val] of Object.entries(a)) {
    if (key === "总结" || !val) continue;
    const emoji = cardTemplates[key] || "📌";
    cardsHTML += `<div class="card"><h3>${emoji} ${key}</h3><div class="content">${val}</div></div>`;
  }
  grid.innerHTML = cardsHTML;

  // 综合总结
  document.getElementById("r-summary").textContent = a.总结 || "";
  document.getElementById("summary-card").style.display = a.总结 ? "block" : "none";


  // 法条统计
  const lawEl = document.getElementById("r-lawstats");
  const 法条信息 = (data.验证 && data.验证.法条统计) ? data.验证.法条统计 : "历史存档";
  lawEl.textContent = "📋 " + 法条信息 + "  |  判例字数：" + (data.字数 || "?");

  // 溯源（历史数据可能为null）
  const trace = data.溯源;
  const traceSection = document.getElementById("trace-section");
  const traceItems = document.getElementById("trace-items");
  if (trace && trace.items && trace.items.length > 0) {
    traceSection.style.display = "block";
    traceItems.innerHTML = trace.items.map(item => {
      const cls = item.有效 ? "" : " invalid";
      return `<div class="trace-item${cls}">
        <div class="label">原文第${item.段号}段</div>
        ${item.内容}
      </div>`;
    }).join("");
  } else if (trace && trace.warning) {
    traceSection.style.display = "block";
    traceItems.innerHTML = `<div class="trace-item invalid"><div class="label">⚠️</div>${trace.warning}</div>`;
  } else {
    traceSection.style.display = "none";
  }

  // 法条库对照（历史数据可能为null）
  const lawSection = document.getElementById("law-section");
  const lawItems = document.getElementById("law-items");
  if (data.法条对照 && data.法条对照.length > 0) {
    lawSection.style.display = "block";
    lawItems.innerHTML = data.法条对照.map(item => {
      // 状态标签颜色
      let 状态色 = "#9ca3af", 状态文字 = item.状态 || "未知";
      if (item.状态 === "现行有效") { 状态色 = "#4ade80"; 状态文字 = "✅ 现行有效"; }
      else if (item.状态 === "已修订") { 状态色 = "#facc15"; 状态文字 = "⚠️ 已修订"; }
      else if (item.状态 === "已废止") { 状态色 = "#f87171"; 状态文字 = "❌ 已废止"; }
      let 附注 = "";
      if (item.施行日期) 附注 += ` · 施行: ${item.施行日期}`;
      if (item.取代) 附注 += ` · ${item.取代}`;
      return `<div class="law-item">
        <div class="law-name">
          ${item.法名} · ${item.引用}
          <span style="color:${状态色};font-size:11px;margin-left:6px;">${状态文字}</span>
        </div>
        ${item.条文}
        ${附注 ? `<div style="font-size:11px;color:#6b7280;margin-top:4px;">${附注}</div>` : ""}
      </div>`;
    }).join("");
  } else {
    lawSection.style.display = "none";
  }

  // 验证
  const v = document.getElementById("validation");
  if (!data.验证 || data.验证.通过) {
    v.className = "validation pass";
    v.textContent = "✅ 验证通过";
  } else {
    v.className = "validation warn";
    v.innerHTML = data.验证.问题.map(p => `<div class="warn-item">${p}</div>`).join("");
  }


  document.getElementById("results").classList.add("active");
  document.getElementById("results").scrollIntoView({ behavior: "smooth" });

  // 显示下载按钮和反馈区（重置表单状态）
  document.getElementById("btnDownload").style.display = "inline-block";
  document.getElementById("feedback-section").style.display = "block";
  document.getElementById("feedback-form").style.display = "block";
  document.getElementById("feedback-done").style.display = "none";
  document.getElementById("feedback-err").style.display = "none";
  // 动态生成反馈选项（基于实际分析字段 + 公共模块）
  const analysisKeys = Object.keys(a).filter(k => k !== "总结" && a[k]);
  const commonModules = ["可信度评分", "综合总结"];
  const allOptions = [...analysisKeys, ...commonModules];
  const chipHTML = allOptions.map(k => `<label class="fb-chip"><input type="checkbox" value="${k}"> ${k}</label>`).join("");
  document.getElementById("q-valuable").innerHTML = chipHTML;
  document.getElementById("q-useless").innerHTML = chipHTML;
  document.getElementById("q-keep").innerHTML = chipHTML;
  // 清除上次勾选和文字
  document.querySelectorAll("#feedback-section input[type=radio], #feedback-section input[type=checkbox]").forEach(el => el.checked = false);
  document.getElementById("feedbackComment").value = "";
  window._lastResult = data;
}

// ---- 反馈 ----
function 收集选中值(容器ID) {
  const checks = document.querySelectorAll(`#${容器ID} input:checked`);
  return Array.from(checks).map(c => c.value);
}

async function 提交反馈() {
  const helpfulness = document.querySelector('input[name="helpfulness"]:checked');
  if (!helpfulness) {
    document.getElementById("feedback-err").style.display = "inline";
    document.getElementById("feedback-err").textContent = "请选择有帮助程度";
    return;
  }
  const mostValuable = 收集选中值("q-valuable");
  if (mostValuable.length === 0) {
    document.getElementById("feedback-err").style.display = "inline";
    document.getElementById("feedback-err").textContent = "请至少选一个最有价值的模块";
    return;
  }
  const leastValuable = 收集选中值("q-useless");
  if (leastValuable.length === 0) {
    document.getElementById("feedback-err").style.display = "inline";
    document.getElementById("feedback-err").textContent = "请至少选一个最没用的模块（可如实选，这对我们非常重要）";
    return;
  }
  const keepThree = 收集选中值("q-keep");
  if (keepThree.length === 0 || keepThree.length > 3) {
    document.getElementById("feedback-err").style.display = "inline";
    document.getElementById("feedback-err").textContent = "请选择1-3个你不能失去的模块";
    return;
  }
  document.getElementById("feedback-err").style.display = "none";

  const issueType = document.querySelector('input[name="issue_type"]:checked');
  const comment = document.getElementById("feedbackComment").value.trim();

  try {
    await fetch("/feedback", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        case_name: window._lastResult?.判例名 || "未知",
        date: new Date().toISOString().slice(0, 10),
        helpfulness: helpfulness.value,
        most_valuable: mostValuable,
        least_valuable: leastValuable,
        keep_three: keepThree,
        issue_types: issueType ? [issueType.value] : [],
        comment: comment
      })
    });
  } catch(e) { /* 静默失败 */ }

  // 隐藏表单，显示感谢（保留DOM，下次分析可重置）
  document.getElementById("feedback-form").style.display = "none";
  document.getElementById("feedback-done").style.display = "block";
}

// ---- 下载报告 ----
function 下载报告() {
  if (!window._lastResult) return;
  const a = window._lastResult.分析;
  const body = Object.assign({ 判例名: window._lastResult.判例名 }, a, {
    法条统计: window._lastResult.验证?.法条统计,
    法条对照: window._lastResult.法条对照,
    溯源: window._lastResult.溯源
  });
  fetch("/download", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  }).then(res => res.blob()).then(blob => {
    const url = URL.createObjectURL(blob);
    const el = document.createElement("a");
    el.href = url;
    el.download = (window._lastResult.判例名 || "report") + "_分析报告.txt";
    el.click();
    URL.revokeObjectURL(url);
  });
}

// ---- 历史记录 ----
var _historyData = [];

async function 切换历史() {
  const list = document.getElementById("historyList");
  const arrow = document.getElementById("historyArrow");

  if (list.classList.contains("active")) {
    list.classList.remove("active");
    arrow.textContent = "▶";
    return;
  }

  // 加载历史
  try {
    const resp = await fetch("/history");
    _historyData = await resp.json();
    渲染历史列表(_historyData);
    list.classList.add("active");
    arrow.textContent = "▼";
  } catch (err) {
    document.getElementById("historyItems").innerHTML = "<div style='color:#e05d5d;font-size:13px;padding:12px;'>加载失败</div>";
    list.classList.add("active");
  }
}

function 渲染历史列表(items) {
  const container = document.getElementById("historyItems");
  if (items.length === 0) {
    container.innerHTML = "<div style='color:#6b7280;font-size:13px;padding:12px;'>暂无匹配记录</div>";
    return;
  }
  container.innerHTML = items.map(item =>
    `<div class="history-item" onclick="加载历史详情('${item.文件名}')">
      <div class="h-name">${item.判例名}</div>
      <div class="h-meta">${item.日期}</div>
    </div>`
  ).join("");
}

// ---- 加载历史详情 ----
async function 加载历史详情(fname) {
  document.getElementById("loading").classList.add("active");
  document.getElementById("results").classList.remove("active");
  document.getElementById("error").classList.remove("active");
  try {
    const resp = await fetch(`/case/${encodeURIComponent(fname)}`);
    const data = await resp.json();
    if (!resp.ok) {
      显示错误(data.error || "加载失败");
      return;
    }
    // 历史数据可能缺少溯源/法条对照，渲染函数已兼容
    data._来自历史 = true;
    渲染结果(data);
  } catch (err) {
    显示错误("加载历史失败: " + err.message);
  }
}

function 过滤历史() {
  const kw = document.getElementById("searchInput").value.trim();
  if (!kw) { 渲染历史列表(_historyData); return; }
  const filtered = _historyData.filter(item =>
    (item.判例名 && item.判例名.includes(kw)) ||
    (item.总结 && item.总结.includes(kw))
  );
  渲染历史列表(filtered);
}
</script>

</body>
</html>
